<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow-Nav: 그늘길 내비게이션</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="sidebar">
    <div id="sidebar-header">
        <span class="logo">&#9728;&#65039;</span>
        <h1>Shadow-Nav</h1>
        <p class="subtitle">가장 시원한 길을 찾아드립니다</p>
    </div>

    <!-- 장소 검색 -->
    <div class="section">
        <div class="input-row">
            <span class="dot start-dot"></span>
            <div class="search-wrap">
                <input type="text" id="input-start" placeholder="출발지 입력" autocomplete="off" />
                <ul class="search-dropdown" id="dropdown-start" style="display:none;"></ul>
            </div>
        </div>
        <div class="divider-line"></div>
        <div class="input-row">
            <span class="dot end-dot"></span>
            <div class="search-wrap">
                <input type="text" id="input-end" placeholder="도착지 입력" autocomplete="off" />
                <ul class="search-dropdown" id="dropdown-end" style="display:none;"></ul>
            </div>
        </div>
    </div>

    <!-- 출발 시간 -->
    <div class="section">
        <label class="section-label">출발 시간</label>
        <div class="time-row">
            <button class="time-btn" id="btn-now" onclick="setNow()">지금</button>
            <button class="time-adj" onclick="adjustTime(-5)">&#9664;</button>
            <input type="text" id="time-display" value="12:00" maxlength="5" />
            <button class="time-adj" onclick="adjustTime(+5)">&#9654;</button>
            <input type="time" id="time-picker" step="300" />
        </div>
    </div>

    <!-- 이동 수단 -->
    <div class="section">
        <label class="section-label">이동 수단</label>
        <div class="mode-row">
            <label class="mode-option">
                <input type="radio" name="mode" value="walk" checked />
                <span>&#127939; 걷기</span>
            </label>
            <label class="mode-option">
                <input type="radio" name="mode" value="bike" />
                <span>&#128690; 걷기+따릉이</span>
            </label>
        </div>
    </div>

    <!-- 길찾기 버튼 -->
    <button id="btn-route" onclick="findRoute()">그늘길 찾기</button>

    <!-- 따릉이 대여소 목록 (자전거 모드) -->
    <div id="ddareungi-panel" class="section hidden">
        <label class="section-label">&#128690; 근처 따릉이 대여소</label>
        <ul id="ddareungi-list"></ul>
    </div>

    <!-- 상태 메시지 -->
    <div id="status-msg"></div>
</div>

<div id="map"></div>

<script src="app.js"></script>
</body>
</html>
