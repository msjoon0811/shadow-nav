<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shadow-Nav: 그늘길 내비게이션</title>
    <!-- Leaflet 지도 CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="sidebar">
        <h2>🌞 Shadow-Nav</h2>
        <div class="control-group">
            <label>출발지: <input type="text" id="start-node" placeholder="예: 신논현역"></label><br>
            <label>도착지: <input type="text" id="end-node" placeholder="예: 강남역"></label><br>
            <button onclick="findRoute()">그늘길 찾기</button>
        </div>
        
        <div class="control-group">
            <label>시간대 시뮬레이션: <span id="time-display">12:00</span></label><br>
            <input type="range" id="time-slider" min="9" max="18" step="0.5" value="12">
        </div>
    </div>
    
    <!-- 지도가 그려질 영역 -->
    <div id="map"></div>

    <!-- Leaflet 지도 JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <!-- 팀원 A가 작성할 메인 로직 -->
    <script src="app.js"></script>
</body>
</html>
